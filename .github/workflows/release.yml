name: 🚀 Vøid Launcher Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Publish APK
    runs-on: ubuntu-latest

    # ── Todo corre desde la subcarpeta donde está gradlew ──
    defaults:
      run:
        working-directory: app

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 Dar permisos a gradlew
        run: chmod +x gradlew

      - name: 🔨 Compilar APK (debug)
        run: ./gradlew assembleDebug --no-daemon

      - name: 📦 Renombrar APK con versión
        run: |
          VERSION=${{ github.ref_name }}
          mkdir -p ../artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             ../artifacts/VoidLauncher_${VERSION}.apk

      - name: 🚀 Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Vøid Launcher ${{ github.ref_name }}"
          generate_release_notes: true
          files: artifacts/VoidLauncher_${{ github.ref_name }}.apk
          body: |
            ## Vøid Launcher ${{ github.ref_name }}

            ### 📲 Instalación
            1. Descarga el APK desde **Assets** aquí abajo
            2. En Android: Ajustes → Seguridad → Fuentes desconocidas ✓
            3. Instala el APK
            4. Ponlo como launcher predeterminado

            ### ⚠️ Requisitos
            - Android 11+ (API 31)
            - Arquitectura x86_64 (emulador) o arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}