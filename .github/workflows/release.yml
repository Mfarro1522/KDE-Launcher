name: 🚀 TAPO-Launcher Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Publish APK
    runs-on: ubuntu-latest

    # ── Permisos para crear releases ──────────────────────────
    permissions:
      contents: write

    defaults:
      run:
        working-directory: app

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔑 Dar permisos a gradlew
        run: chmod +x gradlew

      - name: 🗑️ Eliminar local.properties
        run: rm -f local.properties

      - name: 🔨 Compilar APK release
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: 📦 Copiar APK a artifacts/
        # working-directory es "app/" → "../artifacts" queda en la raíz del repo
        run: |
          VERSION=${{ github.ref_name }}
          mkdir -p ../artifacts
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             ../artifacts/TAPO-Launcher_${VERSION}.apk
          echo "APK copiado:"
          ls -lh ../artifacts/

      - name: 🚀 Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "TAPO-Launcher ${{ github.ref_name }}"
          generate_release_notes: true
          # Ruta relativa a la RAÍZ del repo (no al working-directory)
          files: artifacts/TAPO-Launcher_${{ github.ref_name }}.apk
          body: |
            ## TAPO-Launcher ${{ github.ref_name }}

            ### 📲 Instalación
            1. Descarga el **APK** desde Assets aquí abajo
            2. Android → Ajustes → Seguridad → Fuentes desconocidas ✓
            3. Instala y ponlo como launcher predeterminado

            ### ⚙️ Requisitos
            - Android 8.0+ (API 26)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
